<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="80" fill="#0F172A"/>

  <!-- Card outline -->
  <rect x="80" y="140" width="352" height="232" rx="32" stroke="#F43F5E" stroke-width="12"/>
  <!-- Magnetic stripe -->
  <rect x="80" y="188" width="352" height="56" fill="#1E293B"/>

  <!-- Chip -->
  <rect x="120" y="280" width="52" height="40" rx="8" fill="#F43F5E" opacity="0.8"/>
  <line x1="120" y1="300" x2="172" y2="300" stroke="#0F172A" stroke-width="2"/>
  <line x1="146" y1="280" x2="146" y2="320" stroke="#0F172A" stroke-width="2"/>

  <!-- Card number dots -->
  <circle cx="220" cy="300" r="6" fill="#334155"/>
  <circle cx="238" cy="300" r="6" fill="#334155"/>
  <circle cx="256" cy="300" r="6" fill="#334155"/>
  <circle cx="274" cy="300" r="6" fill="#334155"/>

  <circle cx="304" cy="300" r="6" fill="#334155"/>
  <circle cx="322" cy="300" r="6" fill="#334155"/>
  <circle cx="340" cy="300" r="6" fill="#334155"/>
  <circle cx="358" cy="300" r="6" fill="#334155"/>

  <!-- Minus arrow (money out) -->
  <circle cx="390" cy="168" r="32" fill="rgba(244,63,94,0.18)" stroke="#F43F5E" stroke-width="3"/>
  <line x1="378" y1="168" x2="402" y2="168" stroke="#F43F5E" stroke-width="3" stroke-linecap="round"/>
  <path d="M394 162 L402 168 L394 174" stroke="#F43F5E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
