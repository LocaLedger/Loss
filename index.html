<style>
/* ── Suite Drum ───────────────────────────────────────── */
.suite-drum-wrap {
  height: 44px; overflow: hidden; display: inline-block; vertical-align: middle;
  position: relative;
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 22%, #000 78%, transparent 100%);
  mask-image:         linear-gradient(to bottom, transparent 0%, #000 22%, #000 78%, transparent 100%);
}
.suite-drum { position: relative; transition: transform 0.52s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
.suite-face { display: block; height: 44px; line-height: 44px; white-space: nowrap;
  font-family: 'Space Mono','Courier New',monospace; font-size: 28px; font-weight: 700; color: #F43F5E; }

/* ── Suite Launcher Panel ─────────────────────────────── */
#suiteLauncher {
  background: rgba(15,17,26,0.97);
  border-bottom: 1px solid rgba(244,63,94,0.18);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.suite-module-btn {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: 10px; border: 1px solid transparent;
  background: rgba(255,255,255,0.03); cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  text-align: left; width: 100%;
}
.suite-module-btn:active { transform: scale(0.97); }
.suite-module-btn.active {
  background: rgba(244,63,94,0.14);
  border-color: rgba(244,63,94,0.38);
}
.suite-module-btn:not(.active):hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.08);
}
.suite-module-icon {
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ── Preview Page ─────────────────────────────────────── */
.preview-badge {
  display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 999px; font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
}
@keyframes previewPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.preview-pulse { animation: previewPulse 2.4s ease-in-out infinite; }
.preview-feature-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px; color: #d1d5db;
}
.preview-feature-item:last-child { border-bottom: none; }

/* ── Floating Labels ──────────────────────────────────── */
.float-wrap { position: relative; }
.float-input {
  width: 100%; padding: 20px 12px 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; color: #f1f5f9;
  font-family: 'Space Mono',monospace; font-size: 14px;
  transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
}
.float-input:focus { outline: none; border-color: #F43F5E; }
.float-label {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-size: 14px; color: #64748b;
  pointer-events: none; transition: all 0.15s ease;
  font-family: 'Space Mono',monospace;
}
.float-label.active { top: 8px; transform: none; font-size: 10px; color: #F43F5E; }
.float-input.has-value ~ .float-label,
.float-input:focus ~ .float-label { top: 8px; transform: none; font-size: 10px; color: #F43F5E; }

/* ── Category Chip ────────────────────────────────────── */
.cat-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700;
  font-family: 'Space Mono',monospace;
}

/* ── Amount Input (big) ───────────────────────────────── */
.amount-input-wrap { position: relative; }
.amount-prefix {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 28px; font-weight: 700; color: #F43F5E;
  font-family: 'Space Mono',monospace; pointer-events: none;
}
#amountInput {
  width: 100%; padding: 16px 14px 16px 36px;
  background: rgba(244,63,94,0.06);
  border: 2px solid rgba(244,63,94,0.3);
  border-radius: 14px; color: #f8fafc;
  font-family: 'Space Mono',monospace; font-size: 32px; font-weight: 700;
  text-align: left;
  -webkit-appearance: none; appearance: none;
  transition: border-color 0.15s;
}
#amountInput:focus { outline: none; border-color: #F43F5E; }
#amountInput::placeholder { color: rgba(244,63,94,0.3); }

/* ── Recurring toggle ─────────────────────────────────── */
.recur-freq-btn {
  padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8; cursor: pointer; font-family: 'Space Mono',monospace;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.recur-freq-btn.active {
  background: rgba(244,63,94,0.2); border-color: rgba(244,63,94,0.5); color: #fda4af;
}

/* ── History Cards ────────────────────────────────────── */
.expense-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer; transition: background 0.12s;
  margin-bottom: 6px;
}
.expense-card:active { background: rgba(255,255,255,0.07); }
.expense-card.deleted { opacity: 0.4; }

/* ── Bill Cards ───────────────────────────────────────── */
.bill-card {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 6px;
}
.bill-due-soon { border-color: rgba(244,63,94,0.35); background: rgba(244,63,94,0.06); }

/* ── Settings rows ────────────────────────────────────── */
.settings-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 6px;
}

/* ── Color picker swatch ──────────────────────────────── */
input[type="color"] {
  width: 34px; height: 34px; border-radius: 8px; border: none; cursor: pointer;
  padding: 2px; background: transparent;
}

/* ── Toast ────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: calc(5rem + env(safe-area-inset-bottom,0px));
  right: 1rem; z-index: 9999;
  background: #1e293b; border: 1px solid rgba(244,63,94,0.3);
  color: #f1f5f9; padding: 10px 16px; border-radius: 10px;
  font-size: 12px; font-family: 'Space Mono',monospace;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}
#toast.hidden { opacity: 0; transform: translateY(8px); }

/* ── Sheet & overlay ──────────────────────────────────── */
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; }
#sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #111827; border-radius: 20px 20px 0 0;
  padding: 20px 16px calc(20px + env(safe-area-inset-bottom,0px));
  max-height: 90vh; overflow-y: auto; z-index: 50;
}
</style>

</head>

<script>
/* ════════════════════════════════════════════════════════════
   LOCALOSS — Spending Tracker

const DATA_KEY    = "locaLossData";
const META_KEY    = "locaLossMeta";
const APP_VERSION = "1.0.0";
const ROSE        = "#F43F5E";

/* ── Default categories ──────────────────────────────────── */
const DEFAULT_CATEGORIES = [
  { key: "food",          label: "Food & Dining",    color: "#F43F5E", budget: 400  },
  { key: "transport",     label: "Transport",         color: "#F97316", budget: 200  },
  { key: "housing",       label: "Housing",           color: "#8B5CF6", budget: 1500 },
  { key: "entertainment", label: "Entertainment",     color: "#06B6D4", budget: 100  },
  { key: "health",        label: "Health",            color: "#10B981", budget: 150  },
  { key: "shopping",      label: "Shopping",          color: "#EAB308", budget: 200  },
  { key: "utilities",     label: "Utilities",         color: "#94A3B8", budget: 200  },
  { key: "other",         label: "Other",             color: "#64748B", budget: 0    },
];

/* ── Global State ────────────────────────────────────────── */
let activeTab         = "dashboard";
let showDeleted       = false;
let loadedMonths      = 2;
let allExpenses       = [];
let savedFormData     = null;
let editModeExpense   = null;
let isScrollLoad      = false;
let skipNextFormSave  = false;
let dateFilter        = { type: "month" };
let historyFilters    = { category: "", search: "" };
let historySort       = { type: "date", direction: "desc" };
let _recurringEnabled = false;
let _recurringFreq    = 30;

/* ── Storage ─────────────────────────────────────────────── */
function initStorage() {
  if (!localStorage.getItem(DATA_KEY)) {
    localStorage.setItem(DATA_KEY, JSON.stringify({
      expenses: [],
      categories: DEFAULT_CATEGORIES.map(c => ({ ...c })),
      recurringBills: [],
      version: 1
    }));
  }
  if (!localStorage.getItem(META_KEY)) {
    localStorage.setItem(META_KEY, JSON.stringify({ userId: "user1", nextId: 1 }));
  }
}
initStorage();

function loadData()  { return JSON.parse(localStorage.getItem(DATA_KEY)); }
function saveData(d) { localStorage.setItem(DATA_KEY, JSON.stringify(d)); }
function loadMeta()  { return JSON.parse(localStorage.getItem(META_KEY)); }
function saveMeta(m) { localStorage.setItem(META_KEY, JSON.stringify(m)); }

function generateId() {
  const m = loadMeta();
  const id = `loss_${m.userId}_${m.nextId}`;
  m.nextId++;
  saveMeta(m);
  return id;
}

/* ── Helpers ─────────────────────────────────────────────── */
const $ = id => document.getElementById(id);

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function money(v) { return `$${Number(v||0).toFixed(2)}`; }

function showToast(msg, ms = 2200) {
  const t = $('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(showToast._tid);
  showToast._tid = setTimeout(() => t.classList.add('hidden'), ms);
}

function getCatByKey(key) {
  const data = loadData();
  return (data.categories || []).find(c => c.key === key) || { key, label: key || 'Other', color: '#64748B' };
}

function catChipHtml(key, size = 'sm') {
  const cat = getCatByKey(key);
  const fs = size === 'sm' ? '10px' : '11px';
  const bg = hexToRgba(cat.color, 0.18);
  return `<span class="cat-chip" style="background:${bg};color:${cat.color};border:1px solid ${hexToRgba(cat.color,0.3)};font-size:${fs}">${cat.label}</span>`;
}

function hexToRgba(hex, alpha) {
  if (!hex) return `rgba(100,116,139,${alpha})`;
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16);
  const g = parseInt(h.substring(2,4),16);
  const b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function openSheet() { $('sheet').classList.remove('hidden'); $('overlay').classList.remove('hidden'); }
function closeSheet() { $('sheet').classList.add('hidden'); $('overlay').classList.add('hidden'); }

/* ── Date filter logic ───────────────────────────────────── */
function getFilteredExpenses(expenses) {
  if (!expenses) return [];
  const nonDel = showDeleted ? expenses : expenses.filter(e => !e.deleted);
  const today  = new Date();
  const yr     = today.getFullYear();
  const mo     = today.getMonth();

  let s, en;
  if (dateFilter.type === 'all')    return nonDel;
  if (dateFilter.type === 'week') {
    const day = today.getDay();
    const mon = new Date(today); mon.setDate(today.getDate() - day + (day === 0 ? -6 : 1));
    s  = mon.toISOString().split('T')[0];
    en = today.toISOString().split('T')[0];
  } else if (dateFilter.type === 'month') {
    s  = new Date(yr, mo, 1).toISOString().split('T')[0];
    en = new Date(yr, mo+1, 0).toISOString().split('T')[0];
  } else if (dateFilter.type === 'ytd') {
    s  = new Date(yr, 0, 1).toISOString().split('T')[0];
    en = today.toISOString().split('T')[0];
  } else if (dateFilter.type === 'past3months') {
    s  = new Date(yr, mo-3, 1).toISOString().split('T')[0];
    en = today.toISOString().split('T')[0];
  } else if (dateFilter.type === 'range') {
    s  = dateFilter.startDate;
    en = dateFilter.endDate;
  }
  return s && en ? nonDel.filter(e => e.date >= s && e.date <= en) : nonDel;
}

function setDateFilter(type, start, end, label) {
  dateFilter = { type, startDate: start || null, endDate: end || null };
  const lblEl = $('dateFilterLabel');
  if (lblEl) lblEl.textContent = label || type;
  const fEl = $('filterIndicator');
  if (fEl) fEl.textContent = type === 'all' ? '∞' : '▼';
  updateBannerTotal();
  if (activeTab === 'dashboard') renderDashboard();
  else if (activeTab === 'history') renderHistory();
  closeSheet();
}

function updateBannerTotal() {
  const data     = loadData();
  const filtered = getFilteredExpenses(data.expenses || []);
  const total    = filtered.reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
  const el       = $('monthlyBannerValue');
  if (el) el.textContent = money(total);
}

/* ── Tab Switching ───────────────────────────────────────── */
function switchTab(tab) {
  if (tab !== 'add' && !skipNextFormSave && activeTab === 'add') {
    savedFormData = readFormData();
  }
  skipNextFormSave = false;
  activeTab = tab;

  document.querySelectorAll('.tab[data-tab]').forEach(btn => {
    const active = btn.dataset.tab === tab;
    btn.style.color = active ? ROSE : '';
  });

  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'add')  renderAdd(editModeExpense);
  else if (tab === 'history') { loadedMonths = 2; renderHistory(); }
  else if (tab === 'settings') renderSettings();
}

/* ════════════════════════════════════════════════════════════
   DASHBOARD
════════════════════════════════════════════════════════════ */
function renderDashboard() {
  const data     = loadData();
  const filtered = getFilteredExpenses(data.expenses || []);
  const cats     = data.categories || [];
  const bills    = (data.recurringBills || []).filter(b => b.active !== false);

  const totalSpent  = filtered.reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
  const expCount    = filtered.length;
  const days        = Math.max(1, _periodDays());
  const avgDay      = totalSpent / days;

  // category breakdown
  const catTotals = {};
  filtered.forEach(e => {
    const k = e.category || 'other';
    catTotals[k] = (catTotals[k] || 0) + (parseFloat(e.amount)||0);
  });
  const catSorted = Object.entries(catTotals).sort((a,b) => b[1]-a[1]).slice(0,5);

  // upcoming bills (next 7 days)
  const todayD  = new Date();
  const todayN  = todayD.getDate();
  const upBills = bills.filter(b => {
    const diff = ((b.dueDay - todayN) % 31 + 31) % 31;
    return diff <= 7;
  }).sort((a,b) => {
    const da = ((a.dueDay - todayN) % 31 + 31) % 31;
    const db = ((b.dueDay - todayN) % 31 + 31) % 31;
    return da - db;
  });

  // chart controls
  const chartCtrl = typeof renderChartControls === 'function' ? renderChartControls() : '';

  $('app').innerHTML = `
    <div class="px-4 py-4 space-y-4">

      <!-- Stats row -->
      <div class="grid grid-cols-3 gap-2">
        <div class="rounded-xl p-3 text-center" style="background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.2)">
          <div class="text-xs text-gray-500 mb-1">Spent</div>
          <div class="text-base font-bold" style="color:#fda4af">${money(totalSpent)}</div>
        </div>
        <div class="rounded-xl p-3 text-center" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)">
          <div class="text-xs text-gray-500 mb-1">Entries</div>
          <div class="text-base font-bold text-gray-200">${expCount}</div>
        </div>
        <div class="rounded-xl p-3 text-center" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)">
          <div class="text-xs text-gray-500 mb-1">Avg/Day</div>
          <div class="text-base font-bold text-gray-200">${money(avgDay)}</div>
        </div>
      </div>

      <!-- Charts -->
      <div class="rounded-xl p-4" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)">
        <div class="text-xs text-gray-500 uppercase tracking-widest mb-3" style="font-family:'Space Mono',monospace;letter-spacing:0.1em">Spending Charts</div>
        ${chartCtrl}
        <div id="lossCategoryChart"></div>
        <div id="lossMerchantChart" style="display:none"></div>
        <div id="lossTrendChart"    style="display:none"></div>
      </div>

      <!-- Category breakdown mini -->
      ${catSorted.length ? `
      <div class="rounded-xl p-4" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)">
        <div class="text-xs text-gray-500 uppercase tracking-widest mb-3" style="font-family:'Space Mono',monospace;letter-spacing:0.1em">By Category</div>
        ${catSorted.map(([key, val]) => {
          const cat   = cats.find(c => c.key === key) || { label: key, color: '#64748B', budget: 0 };
          const pct   = totalSpent ? ((val/totalSpent)*100).toFixed(0) : 0;
          const budget = parseFloat(cat.budget) || 0;
          const over   = budget > 0 && val > budget;
          return `
            <div class="flex items-center gap-3 mb-2">
              <span style="width:8px;height:8px;border-radius:50%;background:${cat.color};flex-shrink:0;display:inline-block"></span>
              <div class="flex-1 min-w-0">
                <div class="flex justify-between text-xs mb-1">
                  <span class="text-gray-300 truncate">${cat.label}</span>
                  <span class="${over ? 'text-rose-400' : 'text-gray-400'}">${money(val)}${budget > 0 ? ` / ${money(budget)}` : ''}</span>
                </div>
                <div class="h-1.5 bg-gray-700 rounded-full overflow-hidden">
                  <div class="h-full rounded-full" style="width:${pct}%;background:${cat.color};opacity:${over ? 1 : 0.75}"></div>
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>` : ''}

      <!-- Upcoming bills -->
      ${upBills.length ? `
      <div class="rounded-xl p-4" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)">
        <div class="text-xs text-gray-500 uppercase tracking-widest mb-3" style="font-family:'Space Mono',monospace;letter-spacing:0.1em">Bills Due Soon</div>
        ${upBills.map(b => {
          const diff = ((b.dueDay - todayN) % 31 + 31) % 31;
          const cat  = cats.find(c => c.key === b.category) || { color: '#64748B' };
          const due  = diff === 0 ? 'Due today' : diff === 1 ? 'Due tomorrow' : `Due in ${diff} days`;
          return `
            <div class="bill-card ${diff <= 2 ? 'bill-due-soon' : ''}">
              <div style="width:8px;height:8px;border-radius:50%;background:${cat.color};flex-shrink:0"></div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-bold text-gray-200 truncate">${b.label}</div>
                <div class="text-xs text-gray-500">${due}</div>
              </div>
              <div class="text-sm font-bold ${diff <= 2 ? 'text-rose-400' : 'text-gray-300'}">${money(b.amount)}</div>
            </div>`;
        }).join('')}
      </div>` : ''}

      <!-- No data cta -->
      ${expCount === 0 ? `
      <div class="rounded-xl p-6 text-center" style="background:rgba(244,63,94,0.05);border:1px dashed rgba(244,63,94,0.2)">
        <div class="text-3xl mb-2">💸</div>
        <div class="text-sm text-gray-400 mb-4">No expenses logged for this period.</div>

      </div>` : ''}

    </div>`;

  updateBannerTotal();
  if (typeof renderAllCharts === 'function') setTimeout(renderAllCharts, 30);
}

function _periodDays() {
  const today = new Date();
  if (dateFilter.type === 'week')  return 7;
  if (dateFilter.type === 'month') return new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  if (dateFilter.type === 'ytd')   return Math.ceil((today - new Date(today.getFullYear(),0,1)) / 86400000) + 1;
  if (dateFilter.type === 'range' && dateFilter.startDate && dateFilter.endDate) {
    return Math.max(1, Math.ceil((new Date(dateFilter.endDate) - new Date(dateFilter.startDate)) / 86400000) + 1);
  }
  return 30;
}

/* ════════════════════════════════════════════════════════════
   ADD / EDIT EXPENSE FORM
════════════════════════════════════════════════════════════ */
function renderAdd(existing) {
  const data = loadData();
  const cats = data.categories || [];
  const isEdit = !!existing;

  // Pre-fill from savedFormData or existing record
  const pf = isEdit ? existing : (savedFormData || {});
  const fDate       = pf.date       || todayISO();
  const fAmount     = isEdit ? (existing.amount || '') : (pf.amount || '');
  const fCategory   = isEdit ? (existing.category || '') : (pf.category || (cats[0]?.key || ''));
  const fMerchant   = isEdit ? (existing.merchant || '') : (pf.merchant || '');
  const fNotes      = isEdit ? (existing.notes    || '') : (pf.notes    || '');
  const fRecurring  = isEdit ? !!existing.recurring : !!pf.recurring;
  const fRecurFreq  = isEdit ? (existing.recurringFreq || 30) : (pf.recurringFreq || 30);

  if (!isEdit) {
    _recurringEnabled = fRecurring;
    _recurringFreq    = fRecurFreq;
  }

  const catOptions = cats.map(c =>
    `<option value="${c.key}" ${fCategory === c.key ? 'selected' : ''}>${c.label}</option>`
  ).join('');

  const freqBtns = [7,14,30,91].map(d => {
    const lbl = d===7?'Weekly':d===14?'Bi-weekly':d===30?'Monthly':'Quarterly';
    return `<button type="button" class="recur-freq-btn ${_recurringFreq===d&&_recurringEnabled?'active':''}" onclick="setRecurFreq(${d})">${lbl}</button>`;
  }).join('');

  $('app').innerHTML = `
    <div class="px-4 py-4">

      <div class="text-xs text-gray-500 uppercase tracking-widest mb-4" style="font-family:'Space Mono',monospace;letter-spacing:0.1em">
        ${isEdit ? 'Edit Expense' : 'Log Expense'}
      </div>

      <!-- Receipt Scan -->
      ${!isEdit ? `
      <button type="button" onclick="triggerReceiptScan()"
        class="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-bold mb-4"
        style="background:rgba(244,63,94,0.1);border:1px dashed rgba(244,63,94,0.35);color:#F43F5E;font-family:'Space Mono',monospace;"
        id="scanReceiptBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Scan Receipt
      </button>` : ''}

      <form id="expenseForm" onsubmit="saveExpense(event)">

        <!-- Amount -->
        <div class="amount-input-wrap mb-4">
          <span class="amount-prefix">$</span>
          <input id="amountInput" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00"
            value="${fAmount}" autocomplete="off" required />
        </div>

        <!-- Category -->
        <div class="float-wrap mb-3">
          <select id="categoryInput" class="float-input ${fCategory ? 'has-value' : ''}"
            onchange="updateLabel('categoryLabel')" style="padding-top:20px">
            ${catOptions}
          </select>
          <label id="categoryLabel" class="float-label ${fCategory ? 'active' : ''}">Category</label>
        </div>

        <!-- Merchant -->
        <div class="float-wrap mb-3">
          <input id="merchantInput" type="text" class="float-input ${fMerchant ? 'has-value' : ''}"
            placeholder="" value="${fMerchant}" oninput="updateLabel('merchantLabel')" autocomplete="off" />
          <label id="merchantLabel" class="float-label ${fMerchant ? 'active' : ''}">Merchant / Description</label>
        </div>

        <!-- Date -->
        <div class="float-wrap mb-3">
          <input id="dateInput" type="date" class="float-input has-value"
            value="${fDate}" onchange="updateLabel('dateLabel')" />
          <label id="dateLabel" class="float-label active">Date</label>
        </div>

        <!-- Notes -->
        <div class="float-wrap mb-4">
          <textarea id="notesInput" class="float-input ${fNotes ? 'has-value' : ''}" rows="2"
            placeholder="" oninput="updateLabel('notesLabel')" style="padding-top:22px;resize:none">${fNotes}</textarea>
          <label id="notesLabel" class="float-label ${fNotes ? 'active' : ''}">Notes (optional)</label>
        </div>

        <!-- Recurring toggle -->
        <div class="rounded-xl p-3 mb-4" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08)">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm text-gray-300">Recurring</span>
            <button type="button" onclick="toggleRecurring()"
              class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors"
              style="background:${_recurringEnabled ? ROSE : '#374151'}" id="recurToggleBtn">
              <span class="inline-block h-4 w-4 rounded-full bg-white shadow transition-transform"
                style="transform:translateX(${_recurringEnabled ? '20px' : '4px'})"></span>
            </button>
          </div>
          <div id="recurOptions" class="${_recurringEnabled ? '' : 'hidden'}">
            <div class="flex flex-wrap gap-2">
              ${freqBtns}

          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="w-full py-3 rounded-xl text-sm font-bold text-white mb-3"
          style="background:${ROSE};font-family:'Space Mono',monospace">
          ${isEdit ? 'Save Changes' : 'Save Expense'}

        ${isEdit ? `
        <button type="button" onclick="cancelEdit()"
          class="w-full py-3 rounded-xl text-sm font-bold text-gray-400"
          style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);font-family:'Space Mono',monospace">

      </form>

  setTimeout(() => { const a = $('amountInput'); if (a && !isEdit) a.focus(); }, 80);

function readFormData() {
  const a  = $('amountInput');
  const ca = $('categoryInput');
  const m  = $('merchantInput');
  const d  = $('dateInput');
  const n  = $('notesInput');
  if (!a) return null;
  return {
    amount:       a.value,
    category:     ca?.value || '',
    merchant:     m?.value  || '',
    date:         d?.value  || todayISO(),
    notes:        n?.value  || '',
    recurring:    _recurringEnabled,
    recurringFreq: _recurringFreq,
  };
}

function saveExpense(e) {
  e.preventDefault();
  const fd = readFormData();
  if (!fd || !fd.amount || parseFloat(fd.amount) <= 0) {
    showToast('Enter an amount first'); return;
  }

  const data = loadData();
  const now  = Date.now();

  if (editModeExpense) {
    // Update existing
    const idx = data.expenses.findIndex(x => x.id === editModeExpense.id && x.createdAt === editModeExpense.createdAt);
    if (idx >= 0) {
      data.expenses[idx] = {
        ...data.expenses[idx],
        amount:       parseFloat(fd.amount),
        category:     fd.category,
        merchant:     fd.merchant.trim(),
        date:         fd.date,
        notes:        fd.notes.trim(),
        recurring:    fd.recurring,
        recurringFreq: fd.recurringFreq,
        updatedAt:    now,
      };
    }
    editModeExpense = null;
    updateBottomNavNormal();
    showToast('Expense updated');
  } else {
    // New expense
    const rec = {
      id:           generateId(),
      date:         fd.date,
      amount:       parseFloat(fd.amount),
      category:     fd.category,
      merchant:     fd.merchant.trim(),
      notes:        fd.notes.trim(),
      recurring:    fd.recurring,
      recurringFreq: fd.recurring ? fd.recurringFreq : undefined,
      deleted:      false,
      createdAt:    now,
      updatedAt:    now,
    };
    data.expenses.push(rec);
    showToast('Expense saved');
  }

  saveData(data);
  savedFormData     = null;
  skipNextFormSave  = true;
  _recurringEnabled = false;
  switchTab('history');
}

function cancelEdit() {
  editModeExpense = null;
  updateBottomNavNormal();
  switchTab('history');
}

function setRecurFreq(days) {
  _recurringFreq = days;
  // Re-render just the freq buttons
  document.querySelectorAll('.recur-freq-btn').forEach(btn => {
    const d = parseInt(btn.textContent === 'Weekly' ? 7 : btn.textContent === 'Bi-weekly' ? 14 : btn.textContent === 'Monthly' ? 30 : 91);
    // simpler: just re-render
  });
  renderAdd(editModeExpense);
}

function toggleRecurring() {
  _recurringEnabled = !_recurringEnabled;
  const btn = $('recurToggleBtn');
  const opt = $('recurOptions');
  if (btn) {
    btn.style.background = _recurringEnabled ? ROSE : '#374151';
    btn.querySelector('span').style.transform = `translateX(${_recurringEnabled ? '20px' : '4px'})`;
  }
  if (opt) opt.classList.toggle('hidden', !_recurringEnabled);
}

function updateLabel(labelId) {
  const label = $(labelId);
  if (!label) return;
  const inputId = labelId.replace('Label','Input');
  const input   = $(inputId);
  if (!input) return;
  const hasVal  = input.value && input.value.trim() !== '';
  label.classList.toggle('active', hasVal);
  input.classList.toggle('has-value', hasVal);
}

function updateBottomNavNormal() {
  const nav = $('bottomNav');
  if (nav) nav.style.display = '';
}

/* ════════════════════════════════════════════════════════════
   HISTORY
════════════════════════════════════════════════════════════ */
function renderHistory() {
  const data  = loadData();
  let exps    = getFilteredExpenses(data.expenses || []);

  // Apply search / category filters
  if (historyFilters.category) {
    exps = exps.filter(e => e.category === historyFilters.category);
  }
  if (historyFilters.search) {
    const q = historyFilters.search.toLowerCase();
    exps = exps.filter(e =>
      (e.merchant||'').toLowerCase().includes(q) ||
      (e.notes||'').toLowerCase().includes(q) ||
      (e.category||'').toLowerCase().includes(q)
    );
  }

  // Sort
  if (historySort.direction === 'desc') {
    exps = [...exps].sort((a,b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);
  } else {
    exps = [...exps].sort((a,b) => a.date.localeCompare(b.date) || a.createdAt - b.createdAt);
  }

  allExpenses = exps;

  // Group by month
  const months = {};
  exps.forEach(e => {
    const m = e.date ? e.date.slice(0,7) : '0000-00';
    if (!months[m]) months[m] = [];
    months[m].push(e);
  });

  const monthKeys  = Object.keys(months).sort().reverse();
  const showMonths = monthKeys.slice(0, loadedMonths);

  const cats = data.categories || [];

  let html = `
    <div class="px-4 pt-3 pb-2 sticky top-0 z-10 bg-gray-950/95 backdrop-blur-sm">
      <div class="flex gap-2 mb-2">
        <input id="historySearch" type="search" placeholder="Search merchant…"
          value="${historyFilters.search || ''}"
          oninput="historyFilters.search=this.value; renderHistory()"
          class="flex-1 px-3 py-2 rounded-xl text-sm bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500"
          style="font-family:'Space Mono',monospace" />
        <button onclick="showHistoryFilter()" class="px-3 py-2 rounded-xl text-xs border"
          style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:#94a3b8;font-family:'Space Mono',monospace;white-space:nowrap">
          ${historyFilters.category ? catChipHtml(historyFilters.category) : 'Filter'}
        </button>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-xs text-gray-600">${exps.filter(e=>!e.deleted).length} expense${exps.filter(e=>!e.deleted).length===1?'':'s'}</span>
        <button onclick="showDeleted=!showDeleted;renderHistory()" class="text-xs"
          style="color:${showDeleted ? '#fda4af' : '#64748b'};font-family:'Space Mono',monospace">
          ${showDeleted ? '● showing deleted' : 'show deleted'}
        </button>
      </div>
    </div>
    <div id="historyList" class="px-4 pb-4">`;

  if (exps.length === 0) {
    html += `<div class="text-center py-12">
      <div class="text-3xl mb-2">🧾</div>
      <div class="text-sm text-gray-500">No expenses for this period.</div>
      <button onclick="switchTab('add')" class="mt-4 px-4 py-2 rounded-xl text-xs font-bold text-white" style="background:${ROSE};font-family:'Space Mono',monospace">Log one now</button>
    </div>`;
  } else {
    showMonths.forEach(mk => {
      const mExps = months[mk];
      const mTotal = mExps.filter(e=>!e.deleted).reduce((s,e) => s+(parseFloat(e.amount)||0), 0);
      const [yr, mo] = mk.split('-');
      const mLabel   = new Date(parseInt(yr), parseInt(mo)-1, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' });
      html += `
        <div class="sticky top-16 z-10 flex justify-between items-center py-2 mb-1"
          style="background:rgba(15,23,42,0.97);backdrop-filter:blur(8px);margin-left:-16px;margin-right:-16px;padding-left:16px;padding-right:16px;border-bottom:1px solid rgba(255,255,255,0.05)">
          <span class="text-xs font-bold text-gray-400 uppercase" style="letter-spacing:0.08em">${mLabel}</span>
          <span class="text-sm font-bold" style="color:#fda4af">${money(mTotal)}</span>
        </div>`;
      mExps.forEach(e => {
        const cat  = cats.find(c => c.key === e.category) || { color: '#64748B', label: e.category };
        const chip = catChipHtml(e.category);
        const d    = new Date(e.date + 'T12:00:00');
        const dStr = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
        html += `
          <div class="expense-card ${e.deleted ? 'deleted' : ''}" onclick="showExpenseDetail('${e.id}',${e.createdAt})">
            <div style="width:10px;height:10px;border-radius:50%;background:${cat.color};flex-shrink:0"></div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-0.5">
                <span class="text-sm font-bold text-gray-100 truncate">${e.merchant || cat.label}</span>
                ${e.recurring ? `<svg class="w-3 h-3 text-gray-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>` : ''}
              </div>
              <div class="flex items-center gap-2">
                ${chip}
                <span class="text-xs text-gray-500">${dStr}</span>
              </div>
            </div>
            <div class="text-right flex-shrink-0">
              <div class="font-bold" style="color:#f1f5f9">${money(e.amount)}</div>
            </div>
          </div>`;
      });
    });

    if (monthKeys.length > loadedMonths) {
      html += `<div id="loadMoreBtn" class="text-center py-4">
        <button onclick="loadMoreHistory()" class="px-5 py-2 rounded-xl text-xs text-gray-400 border border-gray-700"
          style="font-family:'Space Mono',monospace">Load more</button>
      </div>`;
    }
  }

  html += '</div>';
  $('app').innerHTML = html;
  updateBannerTotal();
}

function loadMoreHistory() {
  loadedMonths += 2;
  isScrollLoad = true;
  renderHistory();
  isScrollLoad = false;
}

function showExpenseDetail(id, createdAt) {
  const data = loadData();
  const e    = data.expenses.find(x => x.id === id && x.createdAt === createdAt);
  if (!e) return;
  const cat  = (data.categories||[]).find(c => c.key === e.category) || { label: e.category, color: '#64748B' };
  const d    = new Date(e.date + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'long', day:'numeric', year:'numeric' });

  $('sheet').innerHTML = `
    <div>
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-bold text-gray-200" style="font-family:'Space Mono',monospace">Expense Detail</span>
        <button onclick="closeSheet()" style="color:#64748b;font-size:18px;background:none;border:none;cursor:pointer">×</button>
      </div>
      <div class="rounded-xl p-4 mb-4" style="background:${hexToRgba(cat.color,0.08)};border:1px solid ${hexToRgba(cat.color,0.2)}">
        <div class="text-3xl font-bold mb-1" style="color:#f8fafc;font-family:'Space Mono',monospace">${money(e.amount)}</div>
        <div class="text-sm font-bold mb-1">${e.merchant || cat.label}</div>
        <div class="flex items-center gap-2 flex-wrap">
          ${catChipHtml(e.category)}
          <span class="text-xs text-gray-500">${d}</span>
          ${e.recurring ? `<span class="text-xs text-gray-500">↻ Recurring</span>` : ''}
        </div>
        ${e.notes ? `<div class="mt-2 text-xs text-gray-400">${e.notes}</div>` : ''}
      </div>
      ${e.deleted ? `
        <button onclick="restoreExpense('${e.id}',${e.createdAt})" class="w-full py-3 rounded-xl text-sm font-bold text-white mb-2"
          style="background:#10B981;font-family:'Space Mono',monospace">Restore</button>` : `
        <button onclick="startEditExpense('${e.id}',${e.createdAt})" class="w-full py-3 rounded-xl text-sm font-bold text-white mb-2"
          style="background:${ROSE};font-family:'Space Mono',monospace">Edit</button>
        <button onclick="deleteExpense('${e.id}',${e.createdAt})" class="w-full py-3 rounded-xl text-sm font-bold text-gray-400 mb-2"
          style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);font-family:'Space Mono',monospace">Delete</button>`}
      <button onclick="closeSheet()" class="w-full py-3 rounded-xl text-sm text-gray-500"
        style="font-family:'Space Mono',monospace">Close</button>
    </div>`;
  openSheet();
}

function startEditExpense(id, createdAt) {
  const data = loadData();
  const e    = data.expenses.find(x => x.id === id && x.createdAt === createdAt);
  if (!e) return;
  editModeExpense = e;
  closeSheet();
  switchTab('add');
}

function deleteExpense(id, createdAt) {
  const data = loadData();
  const idx  = data.expenses.findIndex(x => x.id === id && x.createdAt === createdAt);
  if (idx >= 0) {
    data.expenses[idx].deleted   = true;
    data.expenses[idx].updatedAt = Date.now();
    saveData(data);
    showToast('Expense deleted');
  }
  closeSheet();
  renderHistory();
}

function restoreExpense(id, createdAt) {
  const data = loadData();
  const idx  = data.expenses.findIndex(x => x.id === id && x.createdAt === createdAt);
  if (idx >= 0) {
    data.expenses[idx].deleted   = false;
    data.expenses[idx].updatedAt = Date.now();
    saveData(data);
    showToast('Expense restored');
  }
  closeSheet();
  renderHistory();
}

  const s = $('rangeStart')?.value;

  setDateFilter('range', s, e, `${s} → ${e}`);
}

  saveData(data);
  closeSheet();

function deleteCategory(idx) {

/* ── Export / Import ─────────────────────────────────────── */
function exportData() {
  const data = loadData();
  const json = JSON.stringify(data, null, 2);
  if (navigator.share) {
    navigator.share({ title: 'LocaLoss Backup', text: json }).catch(() => _copyExport(json));
  } else {
    _copyExport(json);
  }
}

function _copyExport(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard')).catch(() => _fallbackCopy(text));
  } else {
    _fallbackCopy(text);
  }
}

function _fallbackCopy(text) {
  $('sheet').innerHTML = `
    <div>
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-bold text-gray-200" style="font-family:'Space Mono',monospace">Export Data</span>
        <button onclick="closeSheet()" style="color:#64748b;font-size:18px;background:none;border:none;cursor:pointer">×</button>
      </div>
      <textarea class="w-full h-48 p-3 text-xs rounded-xl bg-gray-800 border border-gray-700 text-gray-300"
        style="font-family:'Space Mono',monospace" readonly>${text}</textarea>
      <p class="text-xs text-gray-500 mt-2">Select all and copy this JSON to back up your data.</p>
    </div>`;
  openSheet();
}

function showImport() {
  $('sheet').innerHTML = `
    <div>
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-bold text-gray-200" style="font-family:'Space Mono',monospace">Import Data</span>
        <button onclick="closeSheet()" style="color:#64748b;font-size:18px;background:none;border:none;cursor:pointer">×</button>
      </div>
      <p class="text-xs text-gray-400 mb-3">Paste a LocaLoss JSON backup. Imported expenses will be merged (no duplicates by ID).</p>
      <textarea id="importArea" class="w-full h-40 p-3 text-xs rounded-xl bg-gray-800 border border-gray-700 text-gray-300 mb-3"
        style="font-family:'Space Mono',monospace" placeholder='{"expenses":[...]}'></textarea>
      <button onclick="importData()"
        class="w-full py-3 rounded-xl text-sm font-bold text-white"
        style="background:${ROSE};font-family:'Space Mono',monospace">Import</button>
    </div>`;
  openSheet();
}

function importData() {
  try {
    const raw     = $('importArea')?.value;
    const parsed  = JSON.parse(raw);
    const current = loadData();

    // Merge expenses (no dup IDs)
    const existingIds = new Set((current.expenses||[]).map(e => e.id));
    const newExps     = (parsed.expenses||[]).filter(e => !existingIds.has(e.id));
    current.expenses  = [...(current.expenses||[]), ...newExps];

    // Merge categories (no dup keys)
    if (parsed.categories?.length) {
      const existingKeys = new Set((current.categories||[]).map(c => c.key));
      const newCats      = parsed.categories.filter(c => !existingKeys.has(c.key));
      current.categories = [...(current.categories||[]), ...newCats];
    }

    // Advance nextId
    const allIds = current.expenses.map(e => {
      const parts = e.id?.split('_');
      return parts ? parseInt(parts[parts.length-1]) : 0;
    }).filter(n => !isNaN(n));
    if (allIds.length) {
      const m = loadMeta();
      m.nextId = Math.max(m.nextId, Math.max(...allIds) + 1);
      saveMeta(m);
    }

    saveData(current);
    closeSheet();
    showToast(`Imported ${newExps.length} expense${newExps.length===1?'':'s'}`);
    renderSettings();
  } catch(err) {
    showToast('Invalid JSON — check your backup');
  }
}

function confirmClearAll() {
  if (!confirm('Delete ALL expenses and reset categories? This cannot be undone.')) return;
  if (!confirm('Are you sure? All local data will be permanently deleted.')) return;
  localStorage.removeItem(DATA_KEY);
  localStorage.removeItem(META_KEY);
  initStorage();
  closeSheet();
  showToast('All data cleared');
  switchTab('dashboard');
}

const DRUM_FACE_H  = 44;
let _activeModule  = 'loss';
let _drumStep      = 1; // start on face 1 (Loss)
let _drumIdx       = 1;
let _launcherOpen  = false;
let _drumHovering  = false;
let _drumInterval  = null;
let _drumResetTimer = null;

function initSuiteDrum() {
  _applyFaceColors();
  const drum = $('suiteDrum');
  if (drum) {
    drum.style.transition = 'none';
    drum.style.transform  = `translateY(-${_drumIdx * DRUM_FACE_H}px)`;
    requestAnimationFrame(() => { if (drum) drum.style.transition = ''; });
  }

  const btn = $('suiteLaunchBtn');
  if (btn) {
    btn.addEventListener('mouseenter', () => { _drumHovering = true;  _startDrum(); });
    btn.addEventListener('mouseleave', () => { _drumHovering = false; if (!_launcherOpen) { _stopDrum(); _settleDrum(); } });
  }
}

function _applyFaceColors() {
  document.querySelectorAll('.suite-face').forEach((el, i) => {
    el.style.color = SUITE_MODULES[i % 6].color;
  });
}

function _settleDrum() {
  if (_drumResetTimer) { clearTimeout(_drumResetTimer); _drumResetTimer = null; }
  const faceIdx = SUITE_MODULES.findIndex(m => m.id === _activeModule);
  if (faceIdx < 0) return;
  const drum = $('suiteDrum');
  if (!drum) return;
  drum.style.transition = 'none';
  _drumStep = faceIdx; _drumIdx = faceIdx;
  drum.style.transform = `translateY(-${faceIdx * DRUM_FACE_H}px)`;
  requestAnimationFrame(() => { if (drum) drum.style.transition = ''; });
}

function _startDrum() { if (!_drumInterval) _drumInterval = setInterval(_drumAdvance, 3200); }
function _stopDrum()  { clearInterval(_drumInterval); _drumInterval = null; }

function _drumAdvance() {
  _drumStep++;
  _drumIdx = _drumStep % 6;
  const drum = $('suiteDrum');
  if (!drum) return;
  drum.style.transition = '';
  if (_drumStep % 6 === 0 && _drumStep > 0) {
    drum.style.transform = `translateY(-${_drumStep * DRUM_FACE_H}px)`;
    setTimeout(() => {
      drum.style.transition = 'none';
      _drumStep = 0; _drumIdx = 0;
      drum.style.transform = 'translateY(0)';
      requestAnimationFrame(() => { if (drum) drum.style.transition = ''; });
    }, 520);
  } else {
    drum.style.transform = `translateY(-${_drumStep * DRUM_FACE_H}px)`;
  }
}

function toggleSuiteLauncher() {
  if (_launcherOpen) { closeSuiteLauncher(); return; }
  _launcherOpen = true;
  const panel = $('suiteLauncher');
  if (panel) panel.classList.remove('hidden');
  const chevron = $('suiteChevron');
  if (chevron) chevron.style.transform = 'rotate(180deg)';
  _startDrum();
  setTimeout(() => {
    document.addEventListener('click', _outsideClickHandler, { once: true });
  }, 50);
}

function closeSuiteLauncher() {
  _launcherOpen = false;
  const panel = $('suiteLauncher');
  if (panel) panel.classList.add('hidden');
  const chevron = $('suiteChevron');
  if (chevron) chevron.style.transform = '';
  if (!_drumHovering) { _stopDrum(); _settleDrum(); }
}

function _outsideClickHandler(evt) {
  const panel = $('suiteLauncher');
  const btn   = $('suiteLaunchBtn');
  if (panel && !panel.contains(evt.target) && btn && !btn.contains(evt.target)) {
    closeSuiteLauncher();
  }
}

function switchSuiteModule(id) {
  closeSuiteLauncher();
  _activeModule = id;

  SUITE_MODULES.forEach(m => {
    const btn = $(`suiteBtn-${m.id}`);
    if (btn) btn.classList.toggle('active', m.id === id);
  });

  const faceIdx = SUITE_MODULES.findIndex(m => m.id === id);
  if (faceIdx >= 0) {
    const drum = $('suiteDrum');
    if (drum) {
      drum.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.2,1)';
      _drumStep = faceIdx; _drumIdx = faceIdx;
      drum.style.transform = `translateY(-${faceIdx * DRUM_FACE_H}px)`;
      setTimeout(() => { if (drum) { drum.style.transition = 'none'; requestAnimationFrame(() => { if(drum) drum.style.transition=''; }); } }, 420);
    }

  // Live app navigation — add new app paths here as they launch
  const APP_URLS = {
    labor:  '/Labor/',
    loan:   '/Loan/',
    limit:  '/Limit/?from=loss',
    legacy: '/Legacy/?from=loss',
    liquid: '/Liquid/?from=loss',

  if (id === 'loss') {
    // Already here — just re-render
    switchTab('dashboard');
  } else if (APP_URLS[id]) {
    window.location.href = APP_URLS[id];
  } else {
    _showModulePreview(id);

}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            _showUpdateBanner(nw);
          }
        });
      });
    });
  });
}

function _showUpdateBanner(worker) {
  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;bottom:calc(5rem + env(safe-area-inset-bottom,0px));left:1rem;right:1rem;z-index:9998;background:#1e293b;border:1px solid rgba(244,63,94,0.4);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-family:\'Space Mono\',monospace;font-size:12px;color:#f1f5f9;box-shadow:0 4px 20px rgba(0,0,0,0.5)';
  banner.innerHTML = `<span style="color:#94a3b8">Update available</span><button id="updateNowBtn" style="background:${ROSE};color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;font-family:\'Space Mono\',monospace;cursor:pointer">Update Now</button>`;
  document.body.appendChild(banner);
  banner.querySelector('#updateNowBtn').addEventListener('click', () => {
    worker.postMessage({ type: 'SKIP_WAITING' });
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  });
}

/* ════════════════════════════════════════════════════════════
   RECEIPT SCANNING (Tesseract.js offline OCR)
════════════════════════════════════════════════════════════ */

let _ocrWorker = null;
let _ocrBusy   = false;

async function _getOcrWorker() {
  if (_ocrWorker) return _ocrWorker;
  if (typeof Tesseract === 'undefined') {
    throw new Error('Tesseract.js not loaded — check network connection for first-time setup.');
  }
  _ocrWorker = await Tesseract.createWorker('eng', 1, {
    // No logger to keep console clean
  });
  return _ocrWorker;
}

/** Parse OCR text → {amount, merchant} best guesses. */
function _parseReceiptText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  // Amount: look for the largest dollar value near total/amount keywords,
  // falling back to any X.XX pattern.
  let amount = null;
  const totalRe  = /(?:total|amount|subtotal|due|charged|sale)\s*[:\-]?\s*\$?\s*(\d{1,5}[.,]\d{2})/i;
  const dollarRe = /\$\s*(\d{1,5}[.,]\d{2})/;
  const bareRe   = /\b(\d{1,5}[.,]\d{2})\b/;

  // Prefer a line with "total" keyword
  for (const line of lines) {
    const m = line.match(totalRe);
    if (m) { amount = parseFloat(m[1].replace(',', '.')); break; }
  }
  // Fallback: largest dollar-sign value on the receipt
  if (!amount) {
    let best = 0;
    for (const line of lines) {
      const m = line.match(dollarRe);
      if (m) { const v = parseFloat(m[1].replace(',', '.')); if (v > best) { best = v; amount = v; } }
    }
  }
  // Last resort: largest bare decimal
  if (!amount) {
    let best = 0;
    for (const line of lines) {
      const m = line.match(bareRe);
      if (m) { const v = parseFloat(m[1].replace(',', '.')); if (v > best) { best = v; amount = v; } }
    }
  }

  // Merchant: first non-empty line that isn't mostly numbers/symbols
  let merchant = '';
  for (const line of lines) {
    if (/[a-zA-Z]{3,}/.test(line) && !/^\d/.test(line)) {
      merchant = line.replace(/[^\w\s&'.-]/g, '').trim();
      if (merchant.length >= 3) break;
    }
  }

  return { amount: amount || null, merchant: merchant || '' };
}

function _showOcrOverlay(show, message) {
  let overlay = document.getElementById('ocr-overlay');
  if (!show) { if (overlay) overlay.remove(); return; }
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'ocr-overlay';
    overlay.style.cssText = `position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,0.88);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:'Space Mono',monospace;color:#f1f5f9;gap:16px;`;
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `
    <div style="width:48px;height:48px;border:3px solid rgba(244,63,94,0.3);border-top-color:#F43F5E;
      border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <div style="font-size:13px;color:#94a3b8;max-width:220px;text-align:center;">${message || 'Scanning receipt…'}</div>`;
  if (!document.getElementById('ocr-spin-style')) {
    const s = document.createElement('style');
    s.id = 'ocr-spin-style';
    s.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }
}

function triggerReceiptScan() {
  if (_ocrBusy) { showToast('Scan already in progress…'); return; }
  const inp = document.createElement('input');
  inp.type   = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment'; // prefer rear camera on mobile
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.addEventListener('change', async () => {
    const file = inp.files[0];
    inp.remove();
    if (!file) return;
    await _runOcr(file);
  });
  inp.click();
}

async function _runOcr(file) {
  _ocrBusy = true;
  _showOcrOverlay(true, 'Loading OCR engine…');
  try {
    const worker = await _getOcrWorker();
    _showOcrOverlay(true, 'Scanning receipt…');
    const url = URL.createObjectURL(file);
    const { data: { text } } = await worker.recognize(url);
    URL.revokeObjectURL(url);
    _showOcrOverlay(false);

    const { amount, merchant } = _parseReceiptText(text);

    // Pre-fill the form if on Add tab
    const amtEl  = document.getElementById('amountInput');
    const merEl  = document.getElementById('merchantInput');
    const merLbl = document.getElementById('merchantLabel');

    if (amtEl && amount !== null) {
      amtEl.value = amount.toFixed(2);
      amtEl.classList.add('has-value');
    }
    if (merEl && merchant) {
      merEl.value = merchant;
      merEl.classList.add('has-value');
      if (merLbl) merLbl.classList.add('active');
    }

    if (amount || merchant) {
      showToast(`Receipt parsed${amount ? ' · $' + amount.toFixed(2) : ''}${merchant ? ' · ' + merchant : ''}`);
    } else {
      showToast('Couldn\'t read amounts — fill in manually');
    }
  } catch (err) {
    _showOcrOverlay(false);
    showToast('OCR failed: ' + (err.message || 'unknown error'));
    console.error('[OCR]', err);
  } finally {
    _ocrBusy = false;
  }
}

</script>
